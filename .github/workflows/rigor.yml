name: Rigor
# The slow leg the fast PR suite deliberately skips: full-precision operating-
# characteristics tests (@pytest.mark.slow) and the live R MASS::polr oracle
# provenance refit. Runs weekly and on demand; publish.yml runs the same
# combination as a release gate before any PyPI upload.
on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch: {}
jobs:
  rigor:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.11"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - uses: r-lib/actions/setup-r@v2 # MASS ships with base R; enables the polr oracle refit
      # brant (unlike MASS) is not in base R; the Brant PO provenance gate needs it.
      - run: Rscript -e 'install.packages("brant", repos = "https://cloud.r-project.org")'
      - run: uv sync
      # -n auto distributes the slow cells across runner cores (pytest-xdist).
      # The BLAS thread caps are load-bearing: without them numpy/scipy already
      # spread each fit across both cores, so the xdist workers just oversubscribe
      # and gain ~nothing. Pinning BLAS to one thread gives each worker a real core
      # (genuine ~2x on the 2-core runner) and makes the fits single-threaded, which
      # is also more reproducible. The matrices are small, so per-fit BLAS
      # parallelism was worth little anyway. Reps are independently seeded, so
      # workers stay bit-identical to the serial run.
      - run: uv run pytest --run-slow -n auto
        env:
          OMP_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
