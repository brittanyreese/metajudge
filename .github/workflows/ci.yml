name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      # Pin the interpreter per matrix leg. setup-uv does not take a
      # python-version input, so the matrix is only honored via UV_PYTHON;
      # uv downloads the version if the runner lacks it.
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright
      - run: uv run pytest
      - name: Upload coverage to Codecov
        # One matrix leg only -- otherwise three uploads for the same commit
        # confuse the Codecov UI. continue-on-error: the upload needs
        # CODECOV_TOKEN (see repo secrets); until it's set this step fails
        # without reddening the job. Token via env, not -t: an unset secret
        # renders as a dangling -t flag with no value (CLI parse error).
        if: matrix.python-version == '3.12'
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: uvx codecov-cli upload-process
