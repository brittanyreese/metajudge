name: Publish to PyPI
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}
jobs:
  publish:
    # Real PyPI: only on a version tag push.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    env:
      UV_PYTHON: "3.11"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - uses: r-lib/actions/setup-r@v2 # release gate runs the R polr oracle refit too
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pyright
      # Releases run the full rigor suite (slow operating-characteristics tests +
      # live R oracle provenance), not just the fast PR suite.
      - run: uv run pytest --run-slow -n auto # distribute slow cells across cores (pytest-xdist)
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
  testpypi:
    # TestPyPI dry-run: manual only, to rehearse the upload before the real tag.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    env:
      UV_PYTHON: "3.11"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run pytest
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
