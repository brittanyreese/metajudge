name: Publish to PyPI
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}
jobs:
  publish:
    # Real PyPI: only on a version tag push.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    env:
      UV_PYTHON: "3.11"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - uses: r-lib/actions/setup-r@v2 # release gate runs the R polr oracle refit too
      # brant (unlike MASS) is not in base R; the Brant PO provenance gate needs it.
      - run: Rscript -e 'install.packages("brant", repos = "https://cloud.r-project.org")'
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pyright
      # Releases run the full rigor suite (slow operating-characteristics tests +
      # live R oracle provenance), not just the fast PR suite.
      # -n auto + BLAS thread caps: see rigor.yml for why the caps are load-bearing
      # (without them xdist workers oversubscribe the cores and gain ~nothing).
      - run: uv run pytest --run-slow -n auto
        env:
          OMP_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true # re-pushed existing-version tags skip instead of failing
  testpypi:
    # TestPyPI dry-run: manual only, to rehearse the upload before the real tag.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    env:
      UV_PYTHON: "3.11"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run pytest
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
