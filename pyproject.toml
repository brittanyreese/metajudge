[project]
name = "metajudge"
version = "0.0.1"
description = "Audit an LLM judge/rubric instrument: reliability + DIF report card."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }
authors = [{ name = "metajudge contributors" }]
keywords = ["llm-judge", "psychometrics", "reliability", "dif", "evaluation"]
dependencies = [
    "numpy>=1.26",
    "pandas>=2.1",
    "scipy>=1.11",
    "krippendorff>=0.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "hypothesis>=6.100",
    "pingouin>=0.5",
    "statsmodels>=0.14",
    "ruff>=0.6",
    "pyright>=1.1.380",
    "pre-commit>=3.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metajudge"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.pyright]
include = ["src", "tests"]
typeCheckingMode = "strict"
pythonVersion = "3.11"

[tool.pytest.ini_options]
addopts = "-q --cov=metajudge --cov-report=term-missing"
testpaths = ["tests"]
